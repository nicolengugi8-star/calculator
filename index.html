<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }
        body{
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #1a1a2e;
        }
        .calculator{
            background-color:#16213e;
            border-radius:16px;
            padding:20px;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
            
        }
        input#display{
            width:100%;
            padding: 15px;
            font-size: 28px;
            text-align:right;
            background: #0f3460;
            color:white;
            border:none;
            border-radius: 8px;
            margin-bottom:15px;  
        }
        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap:10px;
        }
        button{
            padding:18px;
            font-size:18px;
            border:none;
            border-radius: 8px;
            cursor: pointer;
            background-color: #e94560;
            color: white;
            transition: background 0.2s;
            text-shadow:1px 1px 2px rgba(0,0,0,0.5);

        }
        button:hover{
            background-color: #c73652;
        }

    </style>

</head>
<body>
    <div class="calculator">
        <input type="text" id="display"disabled>
        <div class="buttons">
            <button
                onclick="clearDisplay()">c</button>
                <button
                onclick="deleteLast()">del</button>
            <button
            onclick="append('*')">*</button>
        <button onclick ="append('/')">/</button>
        <button
        onclick="append('7')">7</button>
        <button
        onclick="append('8')">8</button>
        <button
        onclick="append('9')">9</button>
        <button
        onclick="append('-')">-</button>
    
    <button
    onclick="append('4')">4</button>
    <button
    onclick="append('5')">5</button>
    <button
    onclick="append('6')">6</button>
    <button
    onclick="append('+')">+</button>

    <button
    onclick="append('1')">1</button>
    <button
    onclick="append('2')">2</button>
    <button
    onclick="append('3')">3</button>
    <button
    onclick="calculate()">=</button>

    <button
    onclick="append('0')">0</button>
    <button
    onclick="append('.')">.</button>   
            

        </div>
    
    </div>

    <script>
        let display =
        document.getElementById("display");

        function append(value){
            display.value += value;
        }
        function clearDisplay(){
            display.value ="";
        }
        function deleteLast(){
            display.value =
            display.value.slice(0, -1);
        }

        function calculate(){
            try{
                display.value =
                eval(display.value);
            }catch {
                display.value ="Error";
            }
         
            }

    </script>

  
</body>
</html>
